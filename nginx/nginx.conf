# HARDENING-PLAN.md item #2 — TLS termination + security headers.
# Hostnames are placeholders; replace via the sites-enabled/*.conf files.

worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  # ─── Logging (HARDENING-PLAN item #7 — request ID propagation) ──────────
  log_format vaidix_json escape=json
    '{'
      '"ts":"$time_iso8601",'
      '"remote":"$remote_addr",'
      '"req_id":"$http_x_request_id",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":$status,'
      '"bytes":$body_bytes_sent,'
      '"upstream_status":"$upstream_status",'
      '"upstream_ms":"$upstream_response_time",'
      '"req_ms":$request_time,'
      '"ua":"$http_user_agent",'
      '"host":"$host"'
    '}';
  access_log /var/log/nginx/access.log vaidix_json;
  error_log  /var/log/nginx/error.log warn;

  # ─── Performance ─────────────────────────────────────────────────────────
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;
  client_max_body_size 600m;             # cap aligns with MAX_UPLOAD_SIZE_MB
  proxy_request_buffering off;           # required for streaming uploads to MinIO
  client_body_buffer_size 1m;
  proxy_buffer_size 16k;
  proxy_buffers 4 32k;
  proxy_read_timeout 600s;               # long enough for HLS / SSE
  proxy_send_timeout 600s;

  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ─── Compression ─────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/javascript application/json application/xml
    application/rss+xml application/atom+xml
    image/svg+xml;

  # ─── TLS profile (Mozilla Intermediate, 2024) ───────────────────────────
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:VaidixTLS:50m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;
  ssl_stapling on;
  ssl_stapling_verify on;
  resolver 1.1.1.1 1.0.0.1 valid=300s;   # OCSP

  # ─── HSTS / security headers (applied via map → conf.d) ─────────────────
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(), payment=()" always;

  # ─── Internal nginx healthcheck (used by the compose healthcheck) ───────
  server {
    listen 80 default_server;
    location = /healthz { access_log off; return 200 "ok\n"; }
    # everything else 80→443
    location / { return 301 https://$host$request_uri; }
  }

  include /etc/nginx/sites-enabled/*.conf;
}
