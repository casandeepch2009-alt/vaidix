# HARDENING-PLAN.md item #2 — Vaidix Next.js app vhost.
# Replace `app.vaidix.lvpei.org` with the actual hostname before deploy.

server {
  listen 443 ssl;
  # http2 on;  # disabled — shared 443 ALPN must be HTTP/1.1 so the LiveKit
  # signalling vhost can do WebSocket upgrades. nginx negotiates ALPN
  # per-listen, not per-server, so enabling h2 on ANY 443 server forces h2
  # globally on the port; HTTP/2 then strips the Upgrade/Connection headers
  # mid-flight (RFC 7540) and the browser sees "Connection trouble" at
  # wss://livekit.<domain>. Until LiveKit gets a dedicated host or port, all
  # three 443 vhosts must keep h2 off.
  server_name app.vaidix.lvpei.org;

  ssl_certificate     /etc/letsencrypt/live/app.vaidix.lvpei.org/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/app.vaidix.lvpei.org/privkey.pem;

  # Generate & propagate request id (HARDENING-PLAN item #7).
  set $req_id $http_x_request_id;
  if ($req_id = "") {
    set $req_id $request_id;
  }
  proxy_set_header X-Request-Id $req_id;
  add_header X-Request-Id $req_id always;

  location / {
    proxy_pass http://app:3000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
  }

  # Health endpoints don't need auth and shouldn't be cached.
  location = /api/health  { proxy_pass http://app:3000/api/health;  add_header Cache-Control no-store; }
  location = /api/ready   { proxy_pass http://app:3000/api/ready;   add_header Cache-Control no-store; }
}

# WebSocket upgrade map — required for Next.js HMR-less prod builds and any
# server-sent / streaming responses.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}
