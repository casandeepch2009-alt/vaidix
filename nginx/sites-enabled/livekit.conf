# HARDENING-PLAN.md item #2 — LiveKit signalling over WSS.
# Clients dial wss://livekit.vaidix.lvpei.org; nginx terminates TLS and proxies
# the upgraded WebSocket to the LiveKit server on the internal network.
# Media (RTP/UDP) bypasses nginx and goes direct to the LiveKit ports
# (7881 TCP, 7882/UDP, 50000-50100/UDP) — those are exposed by the compose
# directly and need firewall allow-rules at the host level.

server {
  listen 443 ssl;
  # http2 on;  # MUST stay disabled — see app.conf for the full reason. Even
  # with this server's own h2 off, ALPN is shared per-listen across the
  # whole port, so the OTHER vhosts on 443 must also keep h2 off.
  server_name livekit.vaidix.lvpei.org;

  ssl_certificate     /etc/letsencrypt/live/livekit.vaidix.lvpei.org/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/livekit.vaidix.lvpei.org/privkey.pem;

  # Long-lived signalling connection.
  proxy_read_timeout 86400s;
  proxy_send_timeout 86400s;

  location / {
    proxy_pass http://livekit:7880;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
  }
}
