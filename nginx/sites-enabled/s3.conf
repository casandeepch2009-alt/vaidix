# HARDENING-PLAN.md item #2 — MinIO S3 API + console over TLS.
# The S3 API is consumed both server-side (Next.js → MinIO) and client-side
# (browser → presigned URL). The hostname must be reachable from both.

# CORS map — restricts allowed origins to the app domain.
# Add staging/local origins below as needed.
map $http_origin $cors_origin {
  default                          "";
  "https://app.vaidix.lvpei.org"   "$http_origin";
  "http://localhost:3000"          "$http_origin";
}

server {
  listen 443 ssl;
  # http2 on;  # MUST stay disabled — see app.conf for the full reason
  # (shared 443 ALPN must be HTTP/1.1 for LiveKit WS upgrade).
  server_name s3.vaidix.lvpei.org;

  ssl_certificate     /etc/letsencrypt/live/s3.vaidix.lvpei.org/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/s3.vaidix.lvpei.org/privkey.pem;

  client_max_body_size 600m;
  proxy_request_buffering off;            # streaming uploads
  proxy_buffering        off;             # streaming downloads
  proxy_read_timeout 600s;

  location / {
    # CORS preflight — OPTIONS is handled entirely here, never forwarded.
    # MinIO doesn't need to be configured for CORS when nginx handles it.
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin  $cors_origin always;
      add_header Access-Control-Allow-Methods "GET, PUT, POST, HEAD, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "*" always;
      add_header Access-Control-Expose-Headers "ETag, x-amz-request-id, Content-Length" always;
      add_header Access-Control-Max-Age 3600 always;
      return 204;
    }

    # Inject CORS headers on all non-OPTIONS responses so browsers accept the reply.
    add_header Access-Control-Allow-Origin  $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, PUT, POST, HEAD, DELETE, OPTIONS" always;
    add_header Access-Control-Expose-Headers "ETag, x-amz-request-id, Content-Length" always;

    proxy_pass http://minio:9000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_connect_timeout 10s;
  }
}

# Optional — admin console at https://s3.vaidix.lvpei.org:9443. Restrict to
# admin IPs at the firewall, or drop this server block entirely.
server {
  listen 9443 ssl;
  # http2 on;  # disabled for consistency with the 443 listener above. 9443
  # is the MinIO admin console — h2 wouldn't strictly break here, but the
  # browser already runs the regular 443 vhost on HTTP/1.1, so keep both
  # ports uniform to avoid surprises.
  server_name s3.vaidix.lvpei.org;

  ssl_certificate     /etc/letsencrypt/live/s3.vaidix.lvpei.org/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/s3.vaidix.lvpei.org/privkey.pem;

  location / {
    proxy_pass http://minio:9001;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
  }
}
