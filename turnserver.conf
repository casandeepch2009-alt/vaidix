# ════════════════════════════════════════════════════════════════════════════
# Vaidix — coturn (STUN/TURN) Config
# ════════════════════════════════════════════════════════════════════════════
# WebRTC NAT traversal for participants behind symmetric NATs and corporate
# firewalls. coturn runs with `network_mode: host` (see docker-compose.prod.yml)
# so it binds directly to the EC2 host ports — no Docker port mapping needed.
#
# Operator checklist before `docker compose restart vaidix-coturn`:
#   1. Set `external-ip` to the EC2 public IP / Elastic IP.
#   2. Replace the TURN_PASSWORD placeholder below with a strong value.
#   3. Mirror the SAME password into livekit.prod.yaml under
#      `rtc.turn_servers[0].credential`. The two MUST match — LiveKit passes
#      this credential verbatim to clients, coturn validates against it.
#   4. AWS security group on the EC2: open inbound UDP 3478, TCP 3478, and
#      UDP 49152-65535 (relay range). TLS port 5349 only if you front coturn
#      with a Let's Encrypt cert (out of scope for this revision).
#
# Why static credentials, not `use-auth-secret` time-limited tokens:
#   LiveKit's `rtc.turn_servers` config in livekit.prod.yaml sends `username`
#   + `credential` to clients literally. There is no server-side path for
#   LiveKit to mint REST-time-limited TURN tokens for an external coturn,
#   so the only working combination is static creds on both sides. If you
#   later switch to LiveKit's built-in TURN (the `turn:` block) you get
#   time-limited tokens for free, but then coturn becomes redundant.

listening-port=3478
tls-listening-port=5349

# REQUIRED for production. The EC2 public IP. coturn advertises this address
# in TURN allocation responses so the client knows where to send relayed
# media. Without it, clients receive 172.x.x.x (Docker bridge addrs) and
# every relay attempt fails. Set to the same value clients will dial to —
# typically the same IP that's in LIVEKIT_URL's hostname after DNS resolves.
external-ip=CHANGE_ME_TO_EC2_PUBLIC_IP

# Relay port range. Open this range as UDP inbound on the AWS security group.
# 16 K ports is the coturn default; narrow it only if you have a concrete
# reason — a smaller range trades off the max concurrent relayed sessions.
min-port=49152
max-port=65535

# Static long-term credential. The username is fixed to `livekit` so the
# matching livekit.prod.yaml entry is obvious; the password must be rotated
# in both files together. Quote-safe characters only (no spaces, no `$`).
lt-cred-mech
user=livekit:CHANGE_ME_STRONG_TURN_PASSWORD

# Realm shown in TURN allocation responses. Does not have to be a real DNS
# name — any string accepted by clients works — but using the production
# host makes the credential audit log self-explanatory.
realm=turn.vaidix.arthivaa.com

# Limit bandwidth per session (prevent abuse)
user-quota=12
total-quota=1200

# Logging
verbose
fingerprint
no-cli

# Disable features we don't need (security)
no-loopback-peers
no-multicast-peers
no-tlsv1
no-tlsv1_1
