# ════════════════════════════════════════════════════════════════════════════
# Vaidix — coturn (STUN/TURN) Config
# ════════════════════════════════════════════════════════════════════════════
# WebRTC NAT traversal for participants behind firewalls
# Dev: simple shared secret. Production: time-limited per-user credentials.

listening-port=3478
tls-listening-port=5349

# On production: replace with actual server public IP
# listening-ip=YOUR_SERVER_PUBLIC_IP
# external-ip=YOUR_SERVER_PUBLIC_IP

min-port=49152
max-port=65535

# Use shared-secret mechanism (REST API uses this to mint short-lived creds)
use-auth-secret
static-auth-secret=vaidix_dev_turn_secret_change_me_in_production

realm=vaidix.local

# Limit bandwidth per session (prevent abuse)
user-quota=12
total-quota=1200

# Logging
verbose
fingerprint
no-cli

# Disable features we don't need (security)
no-loopback-peers
no-multicast-peers
no-tlsv1
no-tlsv1_1
