# ════════════════════════════════════════════════════════════════════════════
# Vaidix — Standalone Postgres (matches the Redis / MinIO split pattern)
# ════════════════════════════════════════════════════════════════════════════
# For a v1 deployment on a single EC2. For LVPEI go-live, replace this with
# RDS Multi-AZ (Mumbai) and point DATABASE_URL at the RDS endpoint instead;
# nothing else in the stack changes.
#
# Joins the shared external network `vaidix-net` so the app reaches Postgres
# at hostname `postgres` (DATABASE_URL=postgresql://...@postgres:5432/...).
#
# First-time:
#   docker network create vaidix-net   # one-time, shared by all stacks
#
# Usage:
#   docker compose -f docker-compose.postgres.yml --env-file .env up -d
#   docker compose -f docker-compose.postgres.yml logs -f
#   docker compose -f docker-compose.postgres.yml down
# ════════════════════════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:16-alpine
    container_name: vaidix-postgres
    restart: unless-stopped
    # Loopback-only publish so external hosts can't hit 5432 directly.
    # Inside vaidix-net the app uses postgres:5432.
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vaidix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vaidix}
      # Tighter durability for a single-host setup. Override if you switch
      # to streaming replication later (see scripts/pg-init-replication.sh).
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - vaidix-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vaidix} -d ${POSTGRES_DB:-vaidix}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - vaidix-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G

networks:
  vaidix-net:
    external: true
    name: vaidix-net

volumes:
  vaidix-postgres-data:
    name: vaidix-postgres-data
