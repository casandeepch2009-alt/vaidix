# ════════════════════════════════════════════════════════════════════════════
# Vaidix — Standalone MinIO (S3-compatible object store)
# ════════════════════════════════════════════════════════════════════════════
# Run on its own host (or beside the app) BEFORE bringing the app up. Joins
# the shared external network `vaidix-net` so the app reaches MinIO at
# hostname `minio` (S3_ENDPOINT=http://minio:9000).
#
# First-time setup:
#   docker network create vaidix-net   # one-time, shared by all stacks
#
# Usage:
#   docker compose -f docker-compose.minio.yml --env-file .env up -d
#   docker compose -f docker-compose.minio.yml logs -f
#   docker compose -f docker-compose.minio.yml down
#
# Console:    https://<NEXTAUTH_URL>/admin/storage  (proxied via nginx)
# Direct UI:  http://127.0.0.1:9001                 (loopback only)
# ════════════════════════════════════════════════════════════════════════════

services:
  minio:
    image: minio/minio:latest
    container_name: vaidix-minio
    restart: unless-stopped
    # Loopback-only publishing. Inside vaidix-net the app uses minio:9000.
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
      MINIO_BROWSER_REDIRECT_URL: ${NEXTAUTH_URL}/admin/storage
    command: server /data --console-address ":9001"
    volumes:
      - vaidix-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - vaidix-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G

networks:
  vaidix-net:
    external: true
    name: vaidix-net

volumes:
  vaidix-minio-data:
    name: vaidix-minio-data
